server:
  port: 3002

spring:
  application:
    name: ms-academic

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/academic_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update        # crea/actualiza tablas automáticamente
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        default_batch_fetch_size: 100

  sql:
    init:
      mode: always            # ejecuta data.sql al arrancar
      data-locations: classpath:data.sql

# URL del MS1 para validar tokens y usuarios
ms1:
  url: ${MS1_URL:http://localhost:3001}

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true

# Logging
logging:
  level:
    pe.utec.academic: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN